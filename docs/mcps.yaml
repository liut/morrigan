
depends:
  comm: 'github.com/cupogo/andvari/models/comm'
  oid: 'github.com/cupogo/andvari/models/oid'

enums:

  - comment: MCP 传输类型
    name: TransType
    start: 1 
    type: int8
    values:
      - label: 标准IO
        suffix: StdIO
      - label: SSE
        suffix: SSE
      - label: Streamable
        suffix: Streamable
        alias: [http,HTTP]
      - label: 内部运行
        suffix: InMemory
    stringer: true
    decodable: true
    textMarshaler: true
    textUnmarshaler: true

  - comment: 状态 用于表示连接
    name: Status
    start: 0
    type: int8
    values:
      - label: 断开 初始默认
        suffix: Disconnected
      - label: 连接中
        suffix: Connecting
      - label: 已连接
        suffix: Connected
    stringer: true
    decodable: true
    textMarshaler: true
    textUnmarshaler: true

  - comment: 头类型
    name: HeaderCate
    type: int8
    values:
      - label: None
        suffix: None
      - label: Authorization
        suffix: Authorization
      - label: OwnerID
        suffix: OwnerID
      - label: SessionID
        suffix: SessionID
    multiple: true
    stringer: true
    decodable: true
    textMarshaler: true
    textUnmarshaler: true

dbcode: bun
modelpkg: mcps

models:

  - name: Server
    comment: '服务器'
    tableTag: 'mcp_server,alias:ms'
    fields:
      - type: comm.DefaultModel
      - comment: 名称
        name: Name
        type: string
        tags: {bson: 'name', json: 'name', pg: ',notnull,unique,type:name', binding: 'required'}
        isset: true
        query: 'match'
      - comment: 传输类型
        name: TransType
        type: TransType
        tags: {bson: 'transType', json: 'transType', pg: ',notnull,type:smallint'}
        isset: true
        query: 'equal,decode'
      - comment: 指令 仅对 TransType 为 StdIO 时有效
        name: Command
        type: string
        tags: {bson: 'command', json: 'command', pg: ',notnull'}
        isset: true
      - comment: 完整网址 仅对 TransType 为 SSE 或 HTTP 时有效
        name: URL
        type: string
        tags: {bson: 'url', json: 'url', pg: ',notnull'}
        isset: true
      - comment: '是否激活'
        name: IsActive
        type: bool
        tags: {bson: 'isActive', json: 'isActive', pg: ',notnull'}
        isset: true
        query: 'equal'
      - comment: '连接状态'
        name: Status
        type: Status
        tags: {bson: 'status', json: 'status', pg: ',notnull,type:smallint'}
        isset: true
        query: 'equal'
      - comment: 备注
        name: Remark
        type: string
        tags: {bson: 'remark', json: 'remark', pg: ',notnull'}
        isset: true
      - comment: 头分类
        name: HeaderCate
        type: HeaderCate
        tags: {bson: 'headerCate', json: 'headerCate', pg: ',notnull,type:smallint'}
        isset: true
      - comment: 定制头函数
        name: HeaderFunc
        type: HeaderFunc
        tags: {bson: '-', json: '-', pg: '-'}

      - type: comm.MetaField
    oidcat: file
    specNs: MCP
    hooks:
      afterLoad: yes
      afterList: yes

stores:
  - name: mcpStore
    iname: MCPStore
    siname: MCP
    hods:
      - { name: Server, type: LGCUD }


webcode: chi
webapi:
  formTag: form
  pkg: api
  needAuth: true
  needPerm: true
  uris:
    - model: Server
      prefix: '/api/mcp'
