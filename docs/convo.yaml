
depends:
  comm: 'github.com/cupogo/andvari/models/comm'
  oid: 'github.com/cupogo/andvari/models/oid'

enums:

  - comment: 状态
    name: SessionStatus
    start: 1
    type: int8
    values:
      - label: 开启
        suffix: Open
      - label: 关闭
        suffix: Closed
    stringer: true
    decodable: true
    textMarshaler: true
    textUnmarshaler: true

dbcode: bun
modelpkg: convo

models:

  - name: Session
    comment: '会话'
    tableTag: 'convo_session,alias:cs'
    fields:
      - type: comm.DefaultModel
      - comment: 标题
        name: Title
        type: string
        tags: {bson: 'title', json: 'title', pg: ',notnull'}
        isset: true
        query: 'match'
      - comment: 消息数
        name: MessageCount
        type: int
        tags: {bson: 'msgCount', json: 'msgCount', pg: 'msg_count,notnull,type:smallint'}
        isset: true
      - comment: '状态'
        name: Status
        type: SessionStatus
        tags: {bson: 'status', json: 'status', pg: ',notnull,type:smallint'}
        isset: true
        query: 'equal'
      - comment: 工具
        name: Tools
        type: '[]string'
        tags: {bson: 'tools', json: 'tools', pg: ",notnull,default:'[]'"}
        isset: true

      - type: comm.MetaField
      - type: comm.OwnerField
    oidcat: event
    oidKey: cs
    specNs: convo

  - name: Message
    comment: '消息'
    tableTag: 'convo_message,alias:cm'
    fields:
      - type: comm.DefaultModel
      - comment: 会话编号
        name: SessionID
        type: oid.OID
        tags: {bson: 'session_id', json: 'session', pg: ',notnull', binding: 'required'}
        isset: true
        query: 'equal'
      - comment: 角色
        name: Role
        type: string
        tags: {bson: 'role', json: 'role', pg: ',notnull', binding: 'required'}
        isset: true
        query: 'match'
      - comment: 内容
        name: Content
        type: string
        tags: {bson: 'content', json: 'content', pg: ',notnull', binding: 'required'}
        isset: true
      - comment: 'TokenCount'
        name: TokenCount
        type: int
        tags: {bson: 'tokenCount', json: 'tokenCount', pg: ',notnull,type:smallint'}
        isset: true
      - type: comm.MetaField
    oidcat: message
    specNs: convo

  - name: UsageRecord
    comment: 使用情况 每次请求后记录
    tableTag: 'convo_usage_record,alias:ur'
    fields:
      - type: comm.DefaultModel
      - comment: 会话编号
        name: SessionID
        type: oid.OID
        tags: {bson: 'session_id', json: 'session', pg: ',notnull', binding: 'required'}
        basic: true
        query: 'equal'
      - comment: '消息数'
        name: MsgCount
        type: int
        tags: {bson: 'msgCount', json: 'msgCount', pg: ',notnull,type:smallint'}
        isset: true
      - comment: '输入Token数'
        name: InputTokens
        type: int
        tags: {bson: 'inputTokens', json: 'inputTokens', pg: ',notnull,type:int'}
        basic: true
      - comment: '输出Token数'
        name: OutputTokens
        type: int
        tags: {bson: 'outputTokens', json: 'outputTokens', pg: ',notnull,type:int'}
        basic: true
      - comment: '总Token数'
        name: TotalTokens
        type: int
        tags: {bson: 'totalTokens', json: 'totalTokens', pg: ',notnull,type:int'}
        basic: true
      - comment: 模型
        name: Model
        type: string
        tags: {bson: 'model', json: 'model', pg: ',notnull,type:name'}
        basic: true
      - type: comm.MetaField
    oidcat: event
    specNs: convo

  - name: User
    comment: '用户 来自 OAuth SP 的拷贝'
    tableTag: 'convo_user,alias:au'
    fields:
      - type: comm.DefaultModel
      - comment: '登录名 唯一'
        name: Username
        type: string
        tags: {json: 'username', pg: 'username,notnull,type:name,unique'}
        isset: true
        icse: true
        query: 'match'
      - comment: '昵称'
        name: Nickname
        type: string
        tags: {json: 'nickname', pg: "nickname,notnull,type:varchar(45)"}
        isset: true
        query: 'match'
      - comment: '头像路径'
        name: AvatarPath
        type: string
        tags: {json: 'avatar,omitempty', pg: 'avatar,notnull,type:varchar(125)'}
        isset: true
      - comment: '邮箱'
        name: Email
        type: string
        tags: {json: 'email,omitempty', pg: "email,notnull,use_zero,type:varchar(43)"}
        isset: true
        query: 'match'
        sortable: true
      - comment: '电话'
        name: Phone
        type: string
        tags: {json: 'phone,omitempty', pg: "phone,notnull,use_zero,type:varchar(15)"}
        isset: true
        query: 'match'

      - type: comm.MetaField

    oidcat: account
    specNs: convo
    export1: true


  - name: Memory
    comment: '记忆'
    tableTag: 'convo_memory,alias:mm'
    fields:
      - type: comm.DefaultModel
      - comment: 所有人编号
        name: OwnerID
        type: oid.OID
        tags: {json: 'ownerID', pg: 'owner_id,notnull,type:bigint,unique:mm_key_uid_key'}
        basic: true
        query: equal
      - comment: 关键点
        name: Key
        type: string
        tags: {json: 'key', pg: ',notnull,type:text,unique:mm_key_uid_key'}
        basic: true
        query: 'match'
      - comment: 分类
        name: Cate
        type: string
        tags: {json: 'cate', pg: ',notnull,type:text'}
        isset: true
        query: 'match'
      - comment: 内容
        name: Content
        type: string
        tags: {json: 'content', pg: ',notnull,type:text'}
        isset: true
      - type: comm.MetaField
    oidcat: event
    specNs: convo
    hooks:
      afterCreated: yes
    specExtras:
      - comment: 查全部（含内容）
        name: IsFull
        type: bool
        tags: {form: 'full', json: 'full'}
      - comment: 只查询自己的
        name: IsOwner
        type: bool
        tags: {form: 'own', json: 'own'}


stores:
  - name: convoStore
    embed: ConvoStoreX
    hods:
      - { name: Session, type: LGUD }
      - { name: Message, type: LGD }
      - { name: User, type: LGD, export: G }
      - { name: Memory, type: LGCUD }
      - { name: UsageRecord, type: LGCD }


webcode: chi
webapi:
  formTag: form
  pkg: api
  needAuth: true
  uris:
    - model: Session
      prefix: '/api/convo'
      ignore: CU
    - model: Message
      prefix: '/api/convo'
      ignore: CU
    - model: User
      prefix: '/api/convo'
      ignore: CU
    - model: UsageRecord
      prefix: '/api/convo'
      ignore: CU
