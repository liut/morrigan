name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          install-mode: "goinstall"
          version: v1.64

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Get version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == v* ]]; then
            VERSION="$TAG"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Build all platforms
        env:
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          echo "version: $VERSION"
          GOOS=linux GOARCH=amd64 go build -ldflags "-X github.com/liut/morrigan/pkg/settings.version=$VERSION -s -w" -o morrigan .
          mv morrigan morrigan-linux-amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X github.com/liut/morrigan/pkg/settings.version=$VERSION -s -w" -o morrigan .
          mv morrigan morrigan-darwin-amd64
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X github.com/liut/morrigan/pkg/settings.version=$VERSION -s -w" -o morrigan .
          mv morrigan morrigan-darwin-arm64
          GOOS=windows GOARCH=amd64 go build -ldflags "-X github.com/liut/morrigan/pkg/settings.version=$VERSION -s -w" -o morrigan.exe .
          mv morrigan.exe morrigan-windows-amd64.exe

      - name: Package
        run: |
          tar -cvJf morrigan-linux-amd64-${{ steps.version.outputs.VERSION }}.tar.xz -C . morrigan-linux-amd64
          tar -cvJf morrigan-darwin-amd64-${{ steps.version.outputs.VERSION }}.tar.xz -C . morrigan-darwin-amd64
          tar -cvJf morrigan-darwin-arm64-${{ steps.version.outputs.VERSION }}.tar.xz -C . morrigan-darwin-arm64
          zip morrigan-windows-amd64-${{ steps.version.outputs.VERSION }}.zip morrigan-windows-amd64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            morrigan-linux-amd64-*.tar.xz
            morrigan-darwin-amd64-*.tar.xz
            morrigan-darwin-arm64-*.tar.xz
            morrigan-windows-amd64-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
